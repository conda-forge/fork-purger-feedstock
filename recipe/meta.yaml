{% set name = "fork-purger" %}
{% set version = "21.1.3" %}


package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/fork_purger-{{ version }}.tar.gz
  sha256: df4de6a12fe05f292b44bbd9cf27cecb070e78389327d2dd3d912106a70a074f

build:
  number: 1
  noarch: python
  entry_points:
    - fork-purger = purger.main:cli
  script: {{ PYTHON }} -m pip install . -vv

requirements:
  host:
    - pip
    - python {{ python_min }}
  run:
    - anyio
    - click >=7
    - h2
    - httpx >=0.16.0
    - python >={{ python_min }}

test:
  imports:
    - purger
  commands:
    - pip check
    - fork-purger --help
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/rednafi/fork-purger
  summary: Delete all of your forked repositories on Github.
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - thewchan
